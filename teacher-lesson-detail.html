<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>老师端 - 课程详情</title><link rel="stylesheet" href="style.css"></head>
<body>
<div>
<div class="phone">
  <div class="header">
    <div style="font-size:14px;color:#fff;cursor:pointer;">← 返回</div>
    <h1>课程详情</h1>
    <div style="font-size:13px;color:#AACCEE;cursor:pointer;">编辑</div>
  </div>
  <div class="body">
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div class="avatar" style="width:44px;height:44px;font-size:16px;">明</div>
        <div>
          <div style="font-size:15px;font-weight:bold;color:#222;">小明</div>
          <div style="font-size:12px;color:#888;">钢琴基础班</div>
        </div>
        <div class="badge badge-scheduled" style="margin-left:auto;font-size:12px;padding:4px 10px;">待上课</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div style="background:#F8F9FA;border-radius:8px;padding:8px;">
          <div style="font-size:10px;color:#888;">上课时间</div>
          <div style="font-size:13px;font-weight:bold;color:#222;margin-top:2px;">2024-04-11</div>
          <div style="font-size:12px;color:#555;">18:00–18:45</div>
        </div>
        <div style="background:#F8F9FA;border-radius:8px;padding:8px;">
          <div style="font-size:10px;color:#888;">授课老师</div>
          <div style="font-size:13px;font-weight:bold;color:#222;margin-top:2px;">王老师</div>
          <div style="font-size:12px;color:#555;">45 分钟</div>
        </div>
        <div style="background:#F8F9FA;border-radius:8px;padding:8px;">
          <div style="font-size:10px;color:#888;">剩余课时</div>
          <div style="font-size:13px;font-weight:bold;color:#2C5F8A;margin-top:2px;">8 课时</div>
          <div style="font-size:12px;color:#555;">签到后扣 1 节</div>
        </div>
        <div style="background:#F8F9FA;border-radius:8px;padding:8px;">
          <div style="font-size:10px;color:#888;">课程类型</div>
          <div style="font-size:13px;font-weight:bold;color:#222;margin-top:2px;">周期课</div>
          <div style="font-size:12px;color:#555;">第 3 / 8 节</div>
        </div>
      </div>
    </div>
    <div class="action-row">
      <button class="action-btn action-done">✓ 签到完成</button>
      <button class="action-btn action-absent">! 缺席</button>
      <button class="action-btn action-cancel">✕ 取消</button>
    </div>
    <div class="card" style="margin-top:10px;">
      <div class="card-title">取消选项</div>
      <div style="font-size:12px;color:#666;padding:6px 0;border-bottom:1px solid #F0F0F0;cursor:pointer;">仅取消本节课</div>
      <div style="font-size:12px;color:#FF4D4F;padding:6px 0;cursor:pointer;">取消本节及后续所有课</div>
    </div>
  </div>
</div>
<div class="phone-label">老师端 · 课程详情（待上课）</div>
</div>

<div>
<div class="phone">
  <div class="header">
    <div style="font-size:14px;color:#fff;cursor:pointer;">← 返回</div>
    <h1>课程详情</h1>
    <div style="width:40px;"></div>
  </div>
  <div class="body">
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div class="avatar" style="width:44px;height:44px;font-size:16px;">明</div>
        <div>
          <div style="font-size:15px;font-weight:bold;color:#222;">小明</div>
          <div style="font-size:12px;color:#888;">钢琴基础班</div>
        </div>
        <div class="badge badge-done" style="margin-left:auto;font-size:12px;padding:4px 10px;">已完成</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div style="background:#F8F9FA;border-radius:8px;padding:8px;">
          <div style="font-size:10px;color:#888;">上课时间</div>
          <div style="font-size:13px;font-weight:bold;color:#222;margin-top:2px;">2024-04-11</div>
          <div style="font-size:12px;color:#555;">14:00–14:45</div>
        </div>
        <div style="background:#F8F9FA;border-radius:8px;padding:8px;">
          <div style="font-size:10px;color:#888;">扣课时</div>
          <div style="font-size:13px;font-weight:bold;color:#FF4D4F;margin-top:2px;">-1 课时</div>
          <div style="font-size:12px;color:#555;">剩余 7 课时</div>
        </div>
      </div>
    </div>
    <div class="card" style="background:#F6FFED;border:1px solid #B7EB8F;">
      <div style="font-size:13px;color:#52C41A;font-weight:bold;">✓ 签到成功</div>
      <div style="font-size:11px;color:#666;margin-top:4px;">已于 14:50 完成签到，课时已自动扣除</div>
    </div>
  </div>
</div>
<div class="phone-label">老师端 · 课程详情（已完成）</div>
</div>
</body>
</html>
