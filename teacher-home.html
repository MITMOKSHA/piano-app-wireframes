<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>老师端 - 首页</title><link rel="stylesheet" href="style.css"></head>
<body>
<div>
<div class="phone">
  <div class="header">
    <div><h1>首页</h1><div class="sub">星光钢琴机构</div></div>
    <div class="icon-btn">🔔</div>
  </div>
  <div class="body">
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num">5</div><div class="stat-desc">今日课程</div></div>
      <div class="stat-card"><div class="stat-num">23</div><div class="stat-desc">学员总数</div></div>
      <div class="stat-card"><div class="stat-num stat-warn">3</div><div class="stat-desc">课时不足</div></div>
    </div>
    <div class="card">
      <div class="section-header">
        <div class="card-title">今日课程</div>
        <div class="section-more">查看全部</div>
      </div>
      <div class="lesson-item">
        <div class="dot done"></div>
        <div><div class="lesson-name">小明 · 钢琴基础</div><div class="lesson-meta">14:00–14:45 · 王老师</div></div>
        <div class="badge badge-done">已完成</div>
      </div>
      <div class="lesson-item">
        <div class="dot"></div>
        <div><div class="lesson-name">小红 · 考级班</div><div class="lesson-meta">15:00–15:45 · 王老师</div></div>
        <div class="badge badge-warn">课时不足</div>
      </div>
      <div class="lesson-item">
        <div class="dot"></div>
        <div><div class="lesson-name">小李 · 钢琴基础</div><div class="lesson-meta">18:00–18:45 · 李老师</div></div>
        <div class="badge badge-scheduled">待上课</div>
      </div>
      <div class="lesson-item">
        <div class="dot"></div>
        <div><div class="lesson-name">小张 · 考级班</div><div class="lesson-meta">19:00–19:45 · 李老师</div></div>
        <div class="badge badge-scheduled">待上课</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">课时不足提醒</div>
      <div class="lesson-item">
        <div class="avatar">红</div>
        <div><div class="lesson-name">小红</div><div class="lesson-meta">剩余 2 课时</div></div>
        <div class="badge badge-warn">需续费</div>
      </div>
      <div class="lesson-item">
        <div class="avatar">华</div>
        <div><div class="lesson-name">小华</div><div class="lesson-meta">剩余 1 课时</div></div>
        <div class="badge badge-warn">需续费</div>
      </div>
      <div class="lesson-item">
        <div class="avatar">芳</div>
        <div><div class="lesson-name">小芳</div><div class="lesson-meta">剩余 3 课时</div></div>
        <div class="badge badge-warn">需续费</div>
      </div>
    </div>
  </div>
  <div class="tabbar">
    <div class="tab"><div class="icon active"></div><div class="lbl active">首页</div></div>
    <div class="tab"><div class="icon"></div><div class="lbl">课表</div></div>
    <div class="tab"><div class="icon"></div><div class="lbl">学员</div></div>
    <div class="tab"><div class="icon"></div><div class="lbl">通知</div></div>
    <div class="tab"><div class="icon"></div><div class="lbl">我的</div></div>
  </div>
</div>
<div class="phone-label">老师端 · 首页</div>
</div>
</body>
</html>
