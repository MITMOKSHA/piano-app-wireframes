<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>公共页面 - 登录/注册</title><link rel="stylesheet" href="style.css"></head>
<body>
<!-- 登录页 -->
<div>
<div class="phone">
  <div style="background:#2C5F8A;padding:40px 20px 24px;text-align:center;">
    <div style="font-size:32px;margin-bottom:8px;">🎹</div>
    <div style="font-size:20px;font-weight:bold;color:#fff;">星光钢琴</div>
    <div style="font-size:12px;color:#AACCEE;margin-top:4px;">机构管理系统</div>
  </div>
  <div class="body" style="padding:20px 16px;">
    <div class="form-item">
      <div class="form-label">手机号</div>
      <input class="form-input" placeholder="请输入手机号" />
    </div>
    <div class="form-item">
      <div class="form-label">密码</div>
      <input class="form-input" type="password" placeholder="请输入密码" />
    </div>
    <button class="btn-primary" style="margin-top:8px;">登录</button>
    <button class="btn-outline">注册账号</button>
    <div style="text-align:center;margin-top:16px;">
      <div style="font-size:12px;color:#2C5F8A;cursor:pointer;">创建新机构</div>
    </div>
  </div>
</div>
<div class="phone-label">公共 · 登录页</div>
</div>

<!-- 注册页（老师/学员通用） -->
<div>
<div class="phone">
  <div class="header">
    <div style="font-size:14px;color:#fff;cursor:pointer;">← 返回</div>
    <h1>注册账号</h1>
    <div style="width:40px;"></div>
  </div>
  <div class="body">
    <div style="background:#E6F4FF;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#1677FF;">
      💡 请使用老师录入的手机号注册，系统将自动识别您的身份
    </div>
    <div class="card">
      <div class="form-item">
        <div class="form-label">手机号 *</div>
        <input class="form-input" placeholder="请输入手机号" />
      </div>
      <div class="form-item">
        <div class="form-label">设置密码 *</div>
        <input class="form-input" type="password" placeholder="至少 6 位" />
      </div>
      <div class="form-item">
        <div class="form-label">确认密码 *</div>
        <input class="form-input" type="password" placeholder="再次输入密码" />
      </div>
    </div>
    <button class="btn-primary">注册</button>
  </div>
</div>
<div class="phone-label">公共 · 注册页</div>
</div>

<!-- 创建机构页 -->
<div>
<div class="phone">
  <div class="header">
    <div style="font-size:14px;color:#fff;cursor:pointer;">← 返回</div>
    <h1>创建机构</h1>
    <div style="width:40px;"></div>
  </div>
  <div class="body">
    <div style="background:#E6F4FF;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#1677FF;">
      创建后您将成为该机构的管理员
    </div>
    <div class="card">
      <div class="form-item">
        <div class="form-label">机构名称 *</div>
        <input class="form-input" placeholder="如：星光钢琴" />
      </div>
      <div class="form-item">
        <div class="form-label">您的姓名 *</div>
        <input class="form-input" placeholder="如：王老师" />
      </div>
      <div class="form-item">
        <div class="form-label">手机号 *</div>
        <input class="form-input" placeholder="用于登录" />
      </div>
      <div class="form-item">
        <div class="form-label">设置密码 *</div>
        <input class="form-input" type="password" placeholder="至少 6 位" />
      </div>
      <div class="form-item">
        <div class="form-label">确认密码 *</div>
        <input class="form-input" type="password" placeholder="再次输入" />
      </div>
    </div>
    <button class="btn-primary">创建机构</button>
  </div>
</div>
<div class="phone-label">公共 · 创建机构</div>
</div>
</body>
</html>
